# Shared defaults. Model-specific configs `extends: base.yaml` and override.
# Every run knob lives here — nothing is hard-coded in the Python.

device: auto
seed: 0
compile: true
data_dir: data/wikitext103
train_bin: train.bin
val_bin: val.bin

# model / data shape
sequence_length: 1024
vocab_size: 50304
model_dim: 768
n_layer: 12
n_head: 6

# method
matrix_optimizer: dynmuon       # dynmuon | muon | homogeneous_muon | kaon | relmuon | adamw
routing_mode: schedule_modulated  # fixed | global_schedule | schedule_modulated | stable_rank | snr | snr_ema | alignment
fixed_p: 0.0               # used when routing_mode=fixed (0.0 = Muon, 1.0 = SGD)
spectrum_mode: power       # power | relmuon | random_uniform | inverted
compute_mode: reference    # reference (released DynMuon) | svd (exact) | ns (continuous Gram+NS polar)
ns_variant: quintic        # quintic (reference coefficients) | cubic (textbook); ns mode only
ns_steps: 5                # cubic iteration count; ns mode only
dynmuon_eps: 1.0e-8        # reference optimizer epsilon (fast_spectral keeps its internal 1e-7)
# global_schedule logistic (reference DynMuon get_p): p drops 1 -> -0.25;
# the schedule step starts at 1 on the first optimizer step (reference semantics).
tau_ratio: 0.04            # schedule center (fraction of total steps)
width_ratio: 0.04          # schedule width

# magnitude/spectrum ablations (math.tex §6) — defaults are reference-faithful:
#   magnitude: none      — D(p) is applied as-is; note ||D(p)||_F varies ~sqrt(min(m,n))
#                          across p, so the p schedule doubles as an implicit LR schedule.
#   magnitude: polar_fro — rescale every update to ||D||_F = sqrt(min(m,n)) (the exact
#                          polar factor's norm), so p changes only the spectrum SHAPE.
#   spectrum: power | random | inverted — Kaon-style controls (random/inverted need
#                          compute_mode: svd); both preserve the Frobenius norm of Σ.
magnitude: none
spectrum: power
track_proxies: true        # log sr/gamma/alpha each step (costs one eigvalsh in reference mode)
snr_ema_decay: 0.95        # decay for the snr_ema routing proxy

# optimization
momentum: 0.95
nesterov: true
adjust_lr_fn: spectral_norm   # spectral_norm | rms_norm | none; Muon also supports keller_jordan
muon_lr: 2.0e-2            # max matrix LR
adam_lr: 6.0e-4           # norms / biases (and embed unless embed_lr is set)
embed_lr: 6.0e-3          # tied embedding/head LR (it carries the logit scale;
                          # 6e-4 left embeddings near their init all run long)
weight_decay: 0.1         # decoupled; applies to ALL matrix optimizers (incl. dynmuon)
scalar_weight_decay: 0.0  # embeddings / biases / norm gains
homogeneous_p: 0.25       # HomogeneousMuon fixed exponent after Frobenius normalization

# schedule
warmup_steps: 150
min_lr_ratio: 0.1
grad_clip: 1.0

# batch_size/mbs are sequences. WikiText train: 117.9M tokens.
# 262k tokens/step; 3,125 steps ~= 6.95 WikiText epochs.
batch_size: 256
mbs: 64
train_steps: 3125
val_tokens: 10485760
val_loss_every: 125

# logging / eval
log_every: 10
wandb: false
wandb_project: dynmuon-route-sweeps
wandb_entity: cs-439-project   # W&B team; null -> use WANDB_ENTITY env / default

# experiment 2 — anisotropic noise injection (0 disables)
noise_lambda: 0.0

# Routing parameters. Proxies are RAW and layer-local; calibrate from a short
# `python experiments/probe_proxies.py` run (it prints suggested values).
#
# schedule_modulated (the router): p_{t,l} = clip( p_schedule(t) + beta*(sr - ref) ).
#   `ref` = the typical stable rank; a layer more anisotropic than ref (sr < ref)
#   is pushed negative, a more isotropic one is pushed up. Keep `ref` EQUAL across
#   layer types to get cross-layer separation; give per-type refs to instead
#   modulate each type around its own baseline. `beta` is the (shared) gain.
route:
  schedule_modulated:
    metric: stable_rank        # stable_rank | snr | snr_ema | alignment
    # The 124M probe showed stable rank is dominated by a global temporal rise
    # (~1 -> ~4), with little attn/mlp gap. dynamic_ref centers the nudge on the
    # running cross-layer mean so the schedule owns that trend and the router only
    # responds to per-layer deviation. (alpha separates layers more than sr — try
    # metric: alignment if you want a stronger attn-vs-mlp signal.)
    dynamic_ref: true
    ref_decay: 0.9
    # The 20k FineWeb marathon showed RAW stable-rank deviations reach +55 on
    # early layers: with beta on raw units the router saturates into a
    # bang-bang controller pinned at [p_min, p_max] (7/72 matrices stuck at
    # p=+1 even when the schedule said -0.25). zscore measures the deviation
    # in EMA cross-layer-std units and lean_max bounds the total lean, so the
    # router stays a *perturbation* of the schedule instead of overriding it.
    lean_norm: zscore          # zscore (recommended) | raw (legacy)
    lean_max: 0.25             # max |p_{t,l} - p_t|; null disables
    beta: 0.15                 # p units per cross-layer std of the proxy
    attn:    {ref: 1.95}       # seed/fallback used only if dynamic_ref is off
    mlp:     {ref: 1.95}
    default: {ref: 1.95}
  # Logistic modes (no time schedule): p = p_min + (p_max-p_min)/(1+exp(-(x-mu)/omega)).
  # omega > 0 => p increases with x; omega < 0 => decreases (SNR). Calibrated from
  # the 124M probe (median sr ~1.8 attn / ~2.1 mlp, quarter-spread ~0.86).
  stable_rank:                 # x = raw stable rank, ~O(1-5) for transformer grads
    attn:    {mu: 1.80, omega: 0.86}
    mlp:     {mu: 2.08, omega: 0.86}
    default: {mu: 1.95, omega: 0.86}
  snr:                         # x = gamma; low (noisy) => p -> p_max  (omega < 0)
    default: {mu: 1.5, omega: -0.5}
  snr_ema:                     # x = bias-corrected EMA SNR; same orientation as snr
    default: {mu: 1.0, omega: -0.5}
  alignment:                   # x = alpha in [0, 1]; high => p -> 1
    default: {mu: 0.3, omega: 0.1}
